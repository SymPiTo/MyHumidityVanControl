<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            height: 100% !important;
            background-color: transparent;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }

        .main-container {
            display: flex !important;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .myrow { 
            display: flex !important; 
            width: 90%;
            max-width: 280px;
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
        }

        .mylabel { font-size: 0.95em; opacity: 0.8; }
        .myvalue { font-weight: bold; font-size: 1.1em; color: white !important; }

        button {
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            min-width: 65px;
            font-weight: bold;
            font-size: 0.9em;
            transition: background 0.2s;
        }

        .btn-off { background-color: #444; color: #ccc; }
        .btn-on { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="myrow">
            <span class="mylabel">Feuchtigkeit</span>
            <span id="humidity" class="myvalue">--%</span>
        </div>

        <div class="myrow">
            <span class="mylabel">Lüfter</span>
            <button id="fanState" onclick="toggleFan()">--</button>
        </div>

        <div class="myrow">
            <span class="mylabel">Automatik</span>
            <button id="autoActive" onclick="toggleAuto()">--</button>
        </div>
    </div>

    <script>
        let states = {
            fanState: false,
            autoActive: false
        };

        function toggleAuto() {
            window.requestAction('Active', !states.autoActive);
        }

        function toggleFan() {
            window.requestAction('ToggleFan', !states.fanState);
        }

        function handleMessage(data) {
            try {
                // Sicherstellen, dass data ein Objekt ist
                const d = (typeof data === 'string') ? JSON.parse(data) : data;
                
                if (d.humidity !== undefined) {
                    document.getElementById('humidity').innerText = parseFloat(d.humidity).toFixed(1) + '%';
                }

                if (d.autoActive !== undefined) {
                    states.autoActive = !!d.autoActive;
                    updateBtn('autoActive', states.autoActive);
                }
                
                if (d.fanState !== undefined) {
                    states.fanState = !!d.fanState;
                    updateBtn('fanState', states.fanState);
                }

            } catch(e) { console.error("Update Fehler:", e); }
        }

        function updateBtn(id, isAn) {
            const el = document.getElementById(id);
            if (!el) return;
            el.innerText = isAn ? 'AN' : 'AUS';
            el.className = isAn ? 'btn-on' : 'btn-off';
        }
    </script>
</body>
</html>
